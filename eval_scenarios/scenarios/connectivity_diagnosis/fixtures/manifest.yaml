apiVersion: v1
kind: Namespace
metadata:
  name: connectivity-test
---
# Backend: nginx listening on 8080 internally, but service points to wrong port 9090
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
  namespace: connectivity-test
  labels:
    app: api-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-backend
  template:
    metadata:
      labels:
        app: api-backend
        tier: backend
    spec:
      containers:
      - name: server
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          dnf install -y nmap-ncat > /dev/null 2>&1
          while true; do
            echo -e "HTTP/1.1 200 OK\r\nContent-Type: application/json\r\n\r\n{\"status\":\"healthy\",\"version\":\"2.1.0\"}" | ncat -l -p 8080 -c 'cat'
            sleep 0.1
          done
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "10m"
            memory: "64Mi"
          limits:
            memory: "128Mi"
---
# Service exposes port 9090 but backend listens on 8080 - the mismatch!
apiVersion: v1
kind: Service
metadata:
  name: api-backend-svc
  namespace: connectivity-test
spec:
  selector:
    app: api-backend
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
---
# Frontend: curl loop hitting the service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-client
  namespace: connectivity-test
  labels:
    app: web-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-client
  template:
    metadata:
      labels:
        app: web-client
        tier: frontend
    spec:
      containers:
      - name: client
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          dnf install -y curl > /dev/null 2>&1
          while true; do
            result=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://api-backend-svc:9090/health 2>&1)
            if [ "$result" != "200" ]; then
              echo "$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ) ERROR: Health check to api-backend-svc:9090 failed (status=$result)"
            else
              echo "$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ) INFO: Health check OK"
            fi
            sleep 5
          done
        resources:
          requests:
            cpu: "10m"
            memory: "64Mi"
          limits:
            memory: "128Mi"
